{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Connect - Auth System</title>
    <style>
:root {
    --brand-purple: #7c3aed;
    --brand-purple-hover: #6d28d9;
    --bg-page: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 100%);
    --card-form-bg: #fdfeff;
    --text-dark: #1e293b;
    --text-muted: #64748b;
    --border-color: #cbd5e1;
    --illustration-bg: linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%);
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-page);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-y: auto;
    padding: 20px;
}

@keyframes cardEntrance {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.page-wrapper {
    display: flex;
    background: var(--card-form-bg);
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(15,23,42,.06),
                0 1px 3px rgba(0,0,0,.02);
    width: 100%;
    max-width: 950px;
    min-height: 560px;
    overflow: hidden;
    border: 1px solid rgba(99,102,241,.15);
    position: relative;
    animation: cardEntrance .6s cubic-bezier(.16,1,.3,1) forwards;
}

.illustration-side {
    flex: 1.3;
    background: var(--illustration-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 50px 40px 40px;
    position: relative;
    z-index: 1;
}

.brand-title {
    color: white;
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    margin: 0 0 20px;
    text-align: center;
    text-shadow: 0 4px 14px rgba(0,0,0,.4);
    line-height: 1.1;
}

@keyframes floatArtwork {
    0% { transform: translateY(0px); }
    25% { transform: translateY(-8px); }
    50% { transform: translateY(-15px); }
    75% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

.illustration-side img {
    width: 100%;
    height: auto;
    max-height: 350px;
    object-fit: contain;
    mix-blend-mode: screen;
    opacity: .9;
    margin: auto 0;
    animation: floatArtwork 2.5s ease-in-out infinite;
}

.curvy-divider {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.curvy-divider path {
    fill: var(--card-form-bg);
}

.auth-container {
    flex: 1;
    padding: 50px 45px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--card-form-bg);
    z-index: 1;
}

@keyframes sectionTransition {
    from {
        opacity: 0;
        transform: translateX(15px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

#registerSection,
#loginSection {
    animation: sectionTransition .4s ease-out forwards;
}

h2 {
    color: var(--text-dark);
    margin-bottom: 6px;
    margin-top: 0;
    font-size: 28px;
    font-weight: 700;
}

.subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 28px;
    line-height: 1.4;
}

input,
select {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 14px;
    background: white;
    color: var(--text-dark);
    transition: border-color .2s ease,
                box-shadow .2s ease,
                transform .2s ease;
}

input:focus,
select:focus {
    outline: none;
    border-color: var(--brand-purple);
    box-shadow: 0 0 0 4px rgba(124,58,237,.12);
    transform: translateX(2px);
}

button {
    width: 100%;
    padding: 14px;
    background-color: var(--brand-purple);
    border: none;
    color: white;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 18px;
    transition: background-color .2s ease,
                box-shadow .2s ease,
                transform .1s ease;
    box-shadow: 0 4px 12px rgba(124,58,237,.2);
}

button:hover {
    background-color: var(--brand-purple-hover);
    box-shadow: 0 6px 16px rgba(124,58,237,.3);
    transform: translateY(-1px);
}

button:active {
    transform: scale(.98);
}

@keyframes revealFields {
    from {
        opacity: 0;
        transform: translateY(-8px);
        max-height: 0;
    }
    to {
        opacity: 1;
        transform: translateY(0);
        max-height: 350px;
    }
}

.extra-fields-area {
    background: #f5f3ff;
    padding: 14px;
    border-radius: 10px;
    margin: 8px 0;
    border: 1px dashed #c084fc;
    overflow: hidden;
    animation: revealFields .35s ease forwards;
}

.toggle-link {
    text-align: center;
    margin-top: 22px;
    color: var(--brand-purple);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
}

.toggle-link:hover {
    text-decoration: underline;
}

.hidden {
    display: none !important;
}

@media (max-width: 850px) {

    .page-wrapper {
        flex-direction: column;
        max-width: 440px;
    }

    .illustration-side {
        display: none;
    }

    .curvy-divider {
        display: none;
    }

    .auth-container {
        max-width: 100%;
        padding: 30px;
    }
}
</style>
</head>
<body>

<div class="page-wrapper">
    <svg class="curvy-divider" viewBox="0 0 500 500" preserveAspectRatio="none">
        <path d="M0,0 C150,200 350,0 500,100 L500,500 L0,500 Z"></path>
    </svg>

    <div class="illustration-side">
        <h1 class="brand-title">Campus Connect</h1>
        <img src="{% static 'campus_connect/campus-illustration.png' %}"
     alt="Campus Connect Illustration">
    </div>

    <div class="auth-container">
        <div id="registerSection">
            <h2>Register</h2>
            <p class="subtitle">Create your portal access account.</p>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="email" id="regEmail" placeholder="Email (@nec.edu.np)">
            <input type="password" id="regPass" placeholder="Password">
            <select id="roleSelect" onchange="handleRoleChange()">
                <option value="">Select Role</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
            </select>
            <div id="dynamicInputs" class="extra-fields-area hidden"></div>
            <button onclick="handleRegister()">Create Account</button>
            <p class="toggle-link" onclick="toggleView('login')">Already have an account? Login</p>
        </div>

        <div id="loginSection" class="hidden">
            <h2>Login</h2>
            <p class="subtitle">Log in to view college updates.</p>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <p class="toggle-link" onclick="toggleView('register')">New user? Register here</p>
        </div>
    </div>
</div>

<script>
    const csrfToken = "{{ csrf_token }}";

    // ============================================
    // ADDED: Domain validation helper
    // ============================================
    function isValidNecEmail(email) {
        if (!email) return false;
        return email.trim().toLowerCase().endsWith('@nec.edu.np');
    }

    function handleRoleChange() {
        const role = document.getElementById('roleSelect').value;
        const container = document.getElementById('dynamicInputs');
        container.classList.toggle('hidden', !role);
        
        if (role === 'student') {
            container.innerHTML = `<input type="text" id="rollNo" placeholder="Roll Number">`;
        } else if (role === 'teacher') {
            container.innerHTML = `<input type="text" id="tId" placeholder="Teacher ID">`;
        } else {
            container.innerHTML = `<input type="password" id="adminKey" placeholder="Security Key">`;
        }
    }

    function handleRegister() {
        const data = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            pass: document.getElementById('regPass').value,
            role: document.getElementById('roleSelect').value || 'student'
        };

        // Validate
        if (!data.name || !data.email || !data.pass || !data.role) {
            alert("Please fill in all fields including role selection.");
            return;
        }

        // ============================================
        // ADDED: Domain validation for registration
        // ============================================
        if (!isValidNecEmail(data.email)) {
            alert("Only @nec.edu.np email addresses are allowed to register.");
            return;
        }

        fetch('/api/register/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'X-CSRFToken': csrfToken 
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                // Store user data
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                alert("Account created successfully!");
                window.location.href = "/dashboard/";
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(error => {
            console.error('Registration error:', error);
            alert("Registration failed. Please try again.");
        });
    }

    function handleLogin() {
        const data = {
            email: document.getElementById('loginEmail').value,
            pass: document.getElementById('loginPass').value
        };

        if (!data.email || !data.pass) {
            alert("Please enter both email and password.");
            return;
        }

        // ============================================
        // ADDED: Domain validation for login
        // ============================================
        if (!isValidNecEmail(data.email)) {
            alert("Only @nec.edu.np email addresses are allowed to login.");
            return;
        }

        fetch('/api/login/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'X-CSRFToken': csrfToken 
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                window.location.href = "/dashboard/";
            } else {
                alert("Invalid credentials. Please try again.");
            }
        })
        .catch(error => {
            console.error('Login error:', error);
            alert("Login failed. Please try again.");
        });
    }

    function toggleView(view) {
        document.getElementById('registerSection').classList.toggle('hidden', view === 'login');
        document.getElementById('loginSection').classList.toggle('hidden', view === 'register');
    }
</script>
</body>
</html>
